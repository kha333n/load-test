apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: load-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: load-test-kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["configmaps","secrets","nodes","pods","services","resourcequotas","replicationcontrollers","limitranges","persistentvolumeclaims","persistentvolumes","namespaces","endpoints"]
    verbs: ["list","watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets","daemonsets","deployments","replicasets"]
    verbs: ["list","watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs","jobs"]
    verbs: ["list","watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["list","watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses","networkpolicies"]
    verbs: ["list","watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses","volumeattachments"]
    verbs: ["list","watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["list","watch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["list","watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list","watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations","validatingwebhookconfigurations"]
    verbs: ["list","watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["list","watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles","clusterrolebindings","roles","rolebindings"]
    verbs: ["list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: load-test-kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: load-test-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: load-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: load-test
  labels: {app: kube-state-metrics}
spec:
  replicas: 1
  selector:
    matchLabels: {app: kube-state-metrics}
  template:
    metadata:
      labels: {app: kube-state-metrics}
    spec:
      serviceAccountName: kube-state-metrics
      nodeSelector:
        workload-tier: secondary-1
      tolerations:
        - key: workload-tier
          operator: Equal
          value: secondary-1
          effect: NoSchedule
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          args:
            - --resources=deployments,pods,horizontalpodautoscalers,replicasets,nodes,namespaces
            - --namespaces=load-test
          ports:
            - {containerPort: 8080, name: metrics}
            - {containerPort: 8081, name: telemetry}
          readinessProbe:
            httpGet: {path: /, port: 8081}
            initialDelaySeconds: 5
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits:   {cpu: "250m", memory: "256Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: load-test
  labels: {app: kube-state-metrics}
spec:
  selector: {app: kube-state-metrics}
  ports:
    - {name: metrics, port: 8080, targetPort: 8080}
    - {name: telemetry, port: 8081, targetPort: 8081}
