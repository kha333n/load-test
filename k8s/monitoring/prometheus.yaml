apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: load-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: load-test-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes","nodes/proxy","services","endpoints","pods"]
    verbs: ["get","list","watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: load-test-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: load-test-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: load-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: load-test
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: load-test-app
        scrape_interval: 5s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [load-test]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: load-test-app
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8080"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kube_pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: kube_node

      - job_name: kube-state-metrics
        scrape_interval: 15s
        static_configs:
          - targets: ["kube-state-metrics.load-test.svc:8080"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: load-test
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: load-test
  labels: {app: prometheus}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      serviceAccountName: prometheus
      # Prometheus stays on primary (architecture doc).
      nodeSelector:
        workload-tier: primary
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
            - --web.enable-admin-api
          ports:
            - {containerPort: 9090, name: http}
          readinessProbe:
            httpGet: {path: /-/ready, port: 9090}
            initialDelaySeconds: 10
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
            - {name: data,   mountPath: /prometheus}
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits:   {cpu: "750m", memory: "1Gi"}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
        - name: data
          persistentVolumeClaim: {claimName: prometheus-data}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: load-test
  labels: {app: prometheus}
spec:
  selector: {app: prometheus}
  ports:
    - {name: http, port: 9090, targetPort: 9090}
