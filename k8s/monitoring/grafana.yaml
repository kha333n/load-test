apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: load-test
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.load-test.svc:9090
        isDefault: true
        uid: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: load-test
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: load-test
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: load-test
  labels: {app: grafana}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: grafana}
  template:
    metadata:
      labels: {app: grafana}
    spec:
      nodeSelector:
        workload-tier: primary
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          env:
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Viewer"}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: "admin"}
            - {name: GF_USERS_DEFAULT_THEME, value: "dark"}
            - {name: GF_FEATURE_TOGGLES_ENABLE, value: "publicDashboards"}
          ports:
            - {containerPort: 3000, name: http}
          readinessProbe:
            httpGet: {path: /api/health, port: 3000}
            initialDelaySeconds: 15
          volumeMounts:
            - {name: datasources,        mountPath: /etc/grafana/provisioning/datasources}
            - {name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dashboards,         mountPath: /var/lib/grafana/dashboards}
          resources:
            requests: {cpu: "50m", memory: "128Mi"}
            limits:   {cpu: "500m", memory: "512Mi"}
      volumes:
        - name: datasources
          configMap: {name: grafana-datasources}
        - name: dashboard-provider
          configMap: {name: grafana-dashboard-provider}
        - name: dashboards
          configMap: {name: grafana-dashboards}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: load-test
  labels: {app: grafana}
spec:
  selector: {app: grafana}
  ports:
    - {name: http, port: 3000, targetPort: 3000}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-np
  namespace: load-test
spec:
  type: NodePort
  selector: {app: grafana}
  ports:
    - {name: http, port: 3000, targetPort: 3000, nodePort: 30030}
