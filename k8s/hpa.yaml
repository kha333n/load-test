apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: load-test-app
  namespace: load-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: load-test-app
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - {type: Pods, value: 2, periodSeconds: 30}
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - {type: Pods, value: 1, periodSeconds: 60}
