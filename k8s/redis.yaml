apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: load-test
  labels: {app: redis}
spec:
  replicas: 1
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      nodeSelector:
        workload-tier: secondary-1
      tolerations:
        - key: workload-tier
          operator: Equal
          value: secondary-1
          effect: NoSchedule
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "1000m", memory: "512Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: load-test
spec:
  selector: {app: redis}
  ports:
    - {port: 6379, targetPort: 6379}
