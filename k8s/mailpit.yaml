apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: load-test
  labels: {app: mailpit}
spec:
  replicas: 1
  selector:
    matchLabels: {app: mailpit}
  template:
    metadata:
      labels: {app: mailpit}
    spec:
      nodeSelector:
        workload-tier: secondary-1
      tolerations:
        - key: workload-tier
          operator: Equal
          value: secondary-1
          effect: NoSchedule
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          ports:
            - {containerPort: 1025, name: smtp}
            - {containerPort: 8025, name: web}
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits:   {cpu: "300m", memory: "256Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: load-test
spec:
  selector: {app: mailpit}
  ports:
    - {name: smtp, port: 1025, targetPort: 1025}
    - {name: web,  port: 8025, targetPort: 8025}
