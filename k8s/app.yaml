apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-test-app
  namespace: load-test
  labels: {app: load-test-app}
spec:
  replicas: 1
  selector:
    matchLabels: {app: load-test-app}
  template:
    metadata:
      labels: {app: load-test-app}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Tolerate the secondary node taint so HPA can spread pods across both nodes.
      # nodeSelector intentionally omitted; topologySpreadConstraints handles placement.
      tolerations:
        - key: workload-tier
          operator: Equal
          value: secondary-1
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: load-test-app}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: {app: load-test-app}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: ghcr.io/kha333n/load-test-app:latest
          imagePullPolicy: Always
          ports:
            - {containerPort: 8080, name: http}
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: MYSQL_DSN
              value: "root:root@tcp(mysql.load-test.svc:3306)/loadtest?parseTime=true&charset=utf8mb4"
            - name: REDIS_ADDR
              value: "redis.load-test.svc:6379"
            - name: POD_NAME
              valueFrom:
                fieldRef: {fieldPath: metadata.name}
            - name: NODE_NAME
              valueFrom:
                fieldRef: {fieldPath: spec.nodeName}
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: {cpu: "150m", memory: "128Mi"}
            limits:   {cpu: "750m", memory: "256Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: load-test-app
  namespace: load-test
  labels: {app: load-test-app}
spec:
  selector: {app: load-test-app}
  ports:
    - {name: http, port: 8080, targetPort: 8080}
---
# NodePort for k6 to hit from outside the cluster (no ingress controller installed).
apiVersion: v1
kind: Service
metadata:
  name: load-test-app-np
  namespace: load-test
spec:
  type: NodePort
  selector: {app: load-test-app}
  ports:
    - {name: http, port: 8080, targetPort: 8080, nodePort: 30080}
