# Optional: only useful if an ingress controller (e.g. Traefik) is installed.
# By default, use the NodePort Service from k8s/app.yaml on port 30080.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: load-test-app
  namespace: load-test
spec:
  rules:
    - host: loadtest.kha333n.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: load-test-app
                port: {number: 8080}
