apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: load-test
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: load-test
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: loadtest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: load-test
  labels: {app: mysql}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: {app: mysql}
  template:
    metadata:
      labels: {app: mysql}
    spec:
      nodeSelector:
        workload-tier: secondary-1
      tolerations:
        - key: workload-tier
          operator: Equal
          value: secondary-1
          effect: NoSchedule
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --default-authentication-plugin=mysql_native_password
            - --max-connections=500
          envFrom:
            - secretRef: {name: mysql-secret}
          ports:
            - containerPort: 3306
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - {name: data, mountPath: /var/lib/mysql}
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1500m", memory: "1.5Gi"}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: load-test
spec:
  selector: {app: mysql}
  ports:
    - {port: 3306, targetPort: 3306}
