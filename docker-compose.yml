services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: loadtest
    expose: ["3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LISTEN_ADDR: ":8080"
      MYSQL_DSN: "root:root@tcp(mysql:3306)/loadtest?parseTime=true&charset=utf8mb4"
      REDIS_ADDR: "redis:6379"
      POD_NAME: "local"
      NODE_NAME: "local"
    ports:
      - "8080:8080"
